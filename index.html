<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background: transparent;
  }
  .panel {
    width: 340px; height: 620px;
    background: rgba(26,29,41,0.96);
    border: 1px solid rgba(255,180,84,0.4);
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    color: #e8eaf0;
    display: flex; flex-direction: column;
    overflow: hidden;
    -webkit-app-region: drag; /* 整体可拖动 */
  }
  .panel button, .panel input, .panel .task { -webkit-app-region: no-drag; }

  /* 顶栏 */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .topbar .title { font-size: 13px; font-weight: 600; letter-spacing: 1px; }
  .topbar .title span { color: #ffb454; }
  .topbar .btns { display: flex; gap: 6px; }
  .topbar .btns button {
    width: 22px; height: 22px; border: none; border-radius: 50%;
    background: rgba(255,255,255,0.1); color: #8a8fa3; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .topbar .btns button:hover { background: rgba(255,107,107,0.3); color: #fff; }

  /* 等级条 */
  .level-area { padding: 12px 16px 8px; }
  .level-row { display: flex; align-items: center; gap: 10px; }
  .lv-badge {
    background: linear-gradient(135deg,#ffb454,#ff8c42); color: #1a1a1a;
    font-weight: 700; padding: 3px 10px; border-radius: 6px; font-size: 12px;
  }
  .exp-track { flex: 1; height: 8px; background: rgba(0,0,0,0.4); border-radius: 4px; overflow: hidden; }
  .exp-fill { height: 100%; background: linear-gradient(90deg,#a78bfa,#c4b5fd); transition: width 0.5s; }
  .exp-text { font-size: 11px; color: #8a8fa3; min-width: 70px; text-align: right; font-variant-numeric: tabular-nums; }

  /* 属性条 */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 4px 16px 10px; }
  .stat { text-align: center; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 4px; }
  .stat .ico { font-size: 16px; }
  .stat .v { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .stat .n { font-size: 9px; color: #8a8fa3; }
  .stat.hp .v { color: #ff6b6b; }
  .stat.mp .v { color: #5b8def; }
  .stat.gold .v { color: #ffd166; }
  .stat.wis .v { color: #a78bfa; }

  /* 连续打卡 */
  .streak {
    margin: 0 16px 8px; padding: 8px 12px;
    background: linear-gradient(90deg, rgba(255,180,84,0.12), rgba(255,180,84,0.02));
    border-radius: 8px; display: flex; align-items: center; justify-content: space-between;
    border: 1px solid rgba(255,180,84,0.15);
  }
  .streak .label { font-size: 12px; color: #ffb454; }
  .streak .num { font-size: 18px; font-weight: 700; color: #ffb454; }
  .streak .num small { font-size: 11px; color: #8a8fa3; font-weight: 400; }

  /* 任务列表 */
  .tasks { flex: 1; overflow-y: auto; padding: 4px 16px 8px; }
  .tasks::-webkit-scrollbar { width: 4px; }
  .tasks::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .task {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }
  .task:hover { border-color: rgba(255,180,84,0.3); }
  .task.done {
    background: rgba(110,231,183,0.08);
    border-color: rgba(110,231,183,0.4);
  }
  .task .check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid #3a3f55; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.2s;
  }
  .task.done .check { background: #6ee7b7; border-color: #6ee7b7; color: #1a1a1a; }
  .task .info { flex: 1; min-width: 0; }
  .task .tname { font-size: 13px; font-weight: 500; }
  .task.done .tname { color: #6ee7b7; text-decoration: line-through; opacity: 0.8; }
  .task .tdesc { font-size: 11px; color: #8a8fa3; margin-top: 1px; }
  .task .xp { font-size: 11px; color: #a78bfa; font-weight: 700; flex-shrink: 0; }

  /* 底栏 */
  .bottom {
    padding: 8px 16px 12px; border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-between; align-items: center;
  }
  .bottom .progress { font-size: 11px; color: #8a8fa3; }
  .bottom .reset {
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    color: #8a8fa3; padding: 4px 10px; border-radius: 5px;
    font-size: 11px; cursor: pointer;
  }
  .bottom .reset:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* 完成动画 */
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .task.justDone { animation: pop 0.3s; }

  /* 等级提升提示 */
  .levelup {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: linear-gradient(135deg,#ffb454,#ff8c42); color: #1a1a1a;
    padding: 20px 30px; border-radius: 16px; text-align: center;
    font-weight: 700; font-size: 16px; box-shadow: 0 8px 40px rgba(255,180,84,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99;
  }
  .levelup.show { opacity: 1; }
</style>
</head>
<body>
<div class="panel">
  <!-- 顶栏 -->
  <div class="topbar">
    <div class="title">🎮 <span>新手村</span> 升级面板</div>
    <div class="btns">
      <button id="btnClose" title="隐藏到托盘">—</button>
      <button id="btnQuit" title="隐藏到托盘">✕</button>
    </div>
  </div>

  <!-- 等级条 -->
  <div class="level-area">
    <div class="level-row">
      <span class="lv-badge" id="lvBadge">Lv.1</span>
      <div class="exp-track"><div class="exp-fill" id="expFill" style="width:0%"></div></div>
      <span class="exp-text" id="expText">0 XP</span>
    </div>
  </div>

  <!-- 属性 -->
  <div class="stats">
    <div class="stat hp"><div class="ico">❤️</div><div class="v" id="sHp">10</div><div class="n">气血</div></div>
    <div class="stat mp"><div class="ico">⚡</div><div class="v" id="sMp">10</div><div class="n">精力</div></div>
    <div class="stat gold"><div class="ico">💰</div><div class="v" id="sGold">5</div><div class="n">金币</div></div>
    <div class="stat wis"><div class="ico">🧠</div><div class="v" id="sWis">5</div><div class="n">智慧</div></div>
  </div>

  <!-- 连续打卡 -->
  <div class="streak">
    <span class="label">🔥 连续打卡</span>
    <span class="num" id="streakNum">0 <small>天</small></span>
  </div>

  <!-- 任务列表 -->
  <div class="tasks" id="taskList"></div>

  <!-- 底栏 -->
  <div class="bottom">
    <span class="progress" id="progress">今日 0/6</span>
    <button class="reset" id="resetBtn">重置今日</button>
  </div>

  <div class="levelup" id="levelup">🎉 升级！<br><span id="newLv"></span></div>
</div>

<script>
const TASKS = [
  { key:'morning', name:'寻找晨间之光', desc:'起床+晒晨光15分', xp:10, ico:'🌅' },
  { key:'walk',    name:'新手村的微风', desc:'带猫散步/快走1500步', xp:10, ico:'🐱' },
  { key:'iron',    name:'举铁小副本',   desc:'哑铃/拉伸15分', xp:10, ico:'💪' },
  { key:'skill',   name:'点亮技能树',   desc:'学工作技能30分', xp:15, ico:'💰' },
  { key:'read',    name:'智慧微积累',   desc:'读书5页/播客10分', xp:5, ico:'🧠' },
  { key:'review',  name:'睡前存档点',   desc:'打分复盘2分钟', xp:5, ico:'📝' }
];

let state = null;
let prevLevel = 1;

function calcLevel(xp) {
  // 每100XP一级
  return Math.floor(xp / 100) + 1;
}

function render() {
  if (!state) return;
  const tasks = state.tasks;
  const doneCount = Object.values(tasks).filter(v=>v).length;

  // 等级
  const lv = calcLevel(state.totalXP);
  const curXP = state.totalXP % 100;
  document.getElementById('lvBadge').textContent = 'Lv.' + lv;
  document.getElementById('expFill').style.width = curXP + '%';
  document.getElementById('expText').textContent = state.totalXP + ' XP';

  // 属性（随累计完成数增长）
  const allDone = doneCount;
  document.getElementById('sHp').textContent = 10 + allDone * 3;
  document.getElementById('sMp').textContent = 10 + allDone * 2;
  document.getElementById('sGold').textContent = 5 + allDone * 4;
  document.getElementById('sWis').textContent = 5 + allDone * 2;

  // 连续打卡
  document.getElementById('streakNum').innerHTML = state.streak + ' <small>天</small>';

  // 任务列表
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  TASKS.forEach(t => {
    const done = tasks[t.key];
    const div = document.createElement('div');
    div.className = 'task' + (done ? ' done' : '');
    div.dataset.key = t.key;
    div.innerHTML = `
      <div class="check">${done ? '✓' : ''}</div>
      <div class="info">
        <div class="tname">${t.ico} ${t.name}</div>
        <div class="tdesc">${t.desc}</div>
      </div>
      <div class="xp">+${t.xp}</div>
    `;
    div.addEventListener('click', () => toggleTask(t.key, div));
    list.appendChild(div);
  });

  // 进度
  document.getElementById('progress').textContent = `今日 ${doneCount}/${TASKS.length}`;

  // 升级提示
  if (lv > prevLevel && prevLevel > 0) {
    showLevelUp(lv);
  }
  prevLevel = lv;
}

function showLevelUp(lv) {
  const el = document.getElementById('levelup');
  document.getElementById('newLv').textContent = 'Lv.' + lv;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function toggleTask(key, el) {
  state = await window.api.toggleTask(key);
  // 动画
  if (state.tasks[key]) {
    el.classList.add('justDone');
    setTimeout(() => el.classList.remove('justDone'), 300);
  }
  render();
}

async function load() {
  state = await window.api.getData();
  prevLevel = calcLevel(state.totalXP);
  render();
}

// 按钮
document.getElementById('btnClose').addEventListener('click', () => window.api.minimize());
document.getElementById('btnQuit').addEventListener('click', () => window.api.close());
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (confirm('确定重置今日所有任务进度？')) {
    state = await window.api.resetToday();
    render();
  }
});

load();
// 每分钟刷新一次（防止跨天未刷新）
setInterval(load, 60000);
</script>
</body>
</html>
