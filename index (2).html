<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>觉醒者 · 生命进化系统</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0f1117;--card:#1a1d29;--card2:#222637;--border:#2d3148;
  --text:#e8eaf0;--muted:#8a8fa3;--accent:#ffb454;--accent2:#6ee7b7;
  --hp:#ff6b6b;--mp:#5b8def;--gold:#ffd166;--wis:#a78bfa;
  --sys-blue:#4a9eff;--sys-glow:rgba(74,158,255,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text)}

.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;overflow:hidden}
.tab-content{flex:1;overflow-y:auto;padding:0 16px 90px;scroll-behavior:smooth}
.tab-content::-webkit-scrollbar{width:3px}
.tab-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* 顶栏 */
.topbar{padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.topbar .info{display:flex;align-items:center;gap:8px}
.topbar .lv{background:linear-gradient(135deg,#4a9eff,#2d7de0);color:#fff;font-weight:700;padding:4px 10px;border-radius:6px;font-size:12px;letter-spacing:1px}
.topbar .player-name{font-size:13px;color:var(--sys-blue);font-weight:600}
.topbar .title-badge{font-size:10px;color:var(--accent);background:rgba(255,180,84,.12);padding:2px 6px;border-radius:3px}
.topbar .exp-bar{width:90px;height:6px;background:#0a0c12;border-radius:3px;overflow:hidden}
.topbar .exp-fill{height:100%;background:linear-gradient(90deg,var(--sys-blue),#7eb8ff);transition:width .4s}
.topbar .streak{font-size:12px;color:var(--accent)}

/* 属性 */
.attrs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 0}
.attr{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px}
.attr .ico{font-size:20px}
.attr .right{flex:1}
.attr .name{font-size:11px;color:var(--muted)}
.attr .lvrow{display:flex;align-items:center;justify-content:space-between}
.attr .lv-num{font-size:14px;font-weight:700}
.attr.hp .lv-num{color:var(--hp)}.attr.mp .lv-num{color:var(--mp)}.attr.gold .lv-num{color:var(--gold)}.attr.wis .lv-num{color:var(--wis)}
.attr .bar-wrap{height:4px;background:#0a0c12;border-radius:2px;overflow:hidden;margin-top:4px}
.attr .bar-fill{height:100%;border-radius:2px;transition:width .4s}
.attr.hp .bar-fill{background:var(--hp)}.attr.mp .bar-fill{background:var(--mp)}.attr.gold .bar-fill{background:var(--gold)}.attr.wis .bar-fill{background:var(--wis)}
.attr .exp-label{font-size:9px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}

/* 系统风格提示 */
.sys-hint{background:var(--sys-glow);border:1px solid rgba(74,158,255,.3);border-radius:8px;padding:10px 14px;margin:4px 0 10px;font-size:12px;color:var(--sys-blue)}
.sys-hint .sys-tag{font-size:10px;background:rgba(74,158,255,.2);color:var(--sys-blue);padding:1px 4px;border-radius:2px;font-weight:600;margin-right:4px}
.sys-hint .conds{margin-top:6px;font-size:11px;color:var(--muted)}
.sys-hint .cond{display:flex;align-items:center;gap:4px;margin-top:2px}
.sys-hint .cond .tag{font-size:10px;padding:2px 6px;border-radius:3px}
.sys-hint .cond .tag.met{background:rgba(110,231,183,.2);color:var(--accent2)}
.sys-hint .cond .tag.unmet{background:rgba(255,107,107,.2);color:var(--hp)}

/* 章节卡片 */
.chapter-card{background:var(--card);border:1px solid rgba(74,158,255,.3);border-radius:10px;padding:14px;margin-bottom:8px}
.chapter-card .ch-title{font-size:14px;font-weight:600;color:var(--sys-blue);margin-bottom:6px}
.chapter-card .ch-title .num{color:var(--accent);font-size:12px;margin-right:4px}
.chapter-card .narrative{font-size:12px;color:var(--muted);line-height:1.7;font-style:italic;border-left:2px solid rgba(74,158,255,.2);padding-left:10px;margin-bottom:8px}
.chapter-card .narrative p{margin-bottom:4px}
.chapter-card .goal{font-size:11px;color:var(--accent)}
.chapter-card .unlock{font-size:11px;color:var(--accent2);margin-top:4px}

/* 随机任务区 */
.random-zone{margin-bottom:12px}
.random-zone .zone-title{font-size:13px;color:var(--accent2);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.random-zone .zone-title .blink{animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.random-task{
  background:var(--card);border:1px dashed rgba(110,231,183,.4);border-radius:10px;
  padding:12px;margin-bottom:6px;transition:.2s;cursor:pointer;
}
.random-task.done{border-style:solid;border-color:rgba(110,231,183,.5);background:rgba(110,231,183,.06)}
.random-task .sys-label{font-size:10px;color:var(--sys-blue);font-weight:600;margin-bottom:2px}
.random-task .tname{font-size:13px;font-weight:500}
.random-task.done .tname{color:var(--accent2);text-decoration:line-through;opacity:.7}
.random-task .desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.random-task .reward-row{font-size:11px;margin-top:4px;display:flex;justify-content:space-between}
.random-task .xp-tag{font-weight:700}
.random-task .attr-tag{color:var(--muted)}

/* 固定任务（副本风格） */
.dungeon-task{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:6px;transition:.2s;cursor:pointer;
}
.dungeon-task.done{border-color:rgba(110,231,183,.4);background:rgba(110,231,183,.06)}
.dungeon-task .top{display:flex;align-items:center;gap:8px}
.dungeon-task .check{width:22px;height:22px;border-radius:6px;border:2px solid #3a3f55;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;flex-shrink:0}
.dungeon-task.done .check{background:var(--accent2);border-color:var(--accent2);color:#1a1a1a}
.dungeon-task .tname{font-size:14px;font-weight:500;flex:1}
.dungeon-task.done .tname{color:var(--accent2);text-decoration:line-through;opacity:.7}
.dungeon-task .sys-label{font-size:9px;color:var(--sys-blue);font-weight:600;flex-shrink:0}
.dungeon-task .desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
.dungeon-task .reward{font-size:11px;margin-top:4px;color:var(--accent2)}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.dungeon-task.justDone,.random-task.justDone{animation:pop .3s}

/* 日程表 */
.schedule-wrap{padding:4px 0}
.schedule{width:100%;border-collapse:collapse;font-size:13px}
.schedule td{padding:7px 6px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.schedule .time{color:var(--accent);font-variant-numeric:tabular-nums;min-width:42px;font-weight:500}
.schedule .task-name{color:var(--text)}
.schedule .tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.tag.hp{background:rgba(255,107,107,.15);color:var(--hp)}.tag.mp{background:rgba(91,141,239,.15);color:var(--mp)}.tag.gold{background:rgba(255,209,102,.15);color:var(--gold)}.tag.wis{background:rgba(167,139,250,.15);color:var(--wis)}.tag.rest{background:rgba(138,143,163,.1);color:var(--muted)}.tag.sys{background:var(--sys-glow);color:var(--sys-blue)}

/* 剧情Tab */
.story-chapter{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.story-chapter.locked{opacity:.4;cursor:default;border-style:dashed}
.story-chapter.current{border-color:rgba(74,158,255,.4);background:var(--sys-glow)}
.story-chapter .ch-num{font-size:11px;color:var(--accent)}
.story-chapter .ch-title{font-size:14px;font-weight:600;margin-top:2px}
.story-chapter .ch-title.unlocked{color:var(--sys-blue)}
.story-chapter .ch-title.locked{color:var(--muted)}
.story-chapter .ch-snippet{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic;line-height:1.6}
.story-chapter .ch-badge{font-size:10px;padding:2px 6px;border-radius:3px;margin-top:4px}
.story-chapter .ch-badge.unlocked{background:rgba(74,158,255,.15);color:var(--sys-blue)}
.story-chapter .ch-badge.locked{background:rgba(255,255,255,.05);color:var(--muted)}

/* 章节详情弹窗 */
.chapter-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:110;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.chapter-overlay.show{opacity:1;pointer-events:auto}
.chapter-overlay .modal{background:var(--card);border:2px solid var(--sys-blue);border-radius:16px;padding:20px;text-align:center;max-width:320px;max-height:80vh;overflow-y:auto}
.chapter-overlay .modal .big{font-size:36px;margin-bottom:4px}
.chapter-overlay .modal .sys-tag{font-size:11px;color:var(--sys-blue);font-weight:600;background:var(--sys-glow);padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:6px}
.chapter-overlay .modal .title{font-size:16px;font-weight:700;color:var(--sys-blue)}
.chapter-overlay .modal .narrative{font-size:13px;color:var(--muted);line-height:1.7;font-style:italic;text-align:left;border-left:2px solid var(--sys-blue);padding-left:10px;margin-top:10px}
.chapter-overlay .modal .narrative p{margin-bottom:6px}
.chapter-overlay .modal .info-row{font-size:12px;color:var(--accent);margin-top:10px}
.chapter-overlay .modal .btn{margin-top:14px;background:var(--sys-blue);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}

/* 提醒弹窗 */
.reminder-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:105;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.reminder-overlay.show{opacity:1;pointer-events:auto}
.reminder-overlay .card{background:var(--card);border:1px solid var(--sys-blue);border-radius:12px 12px 0 0;max-width:480px;width:100%;padding:16px}
.reminder-overlay .card .sys-header{font-size:12px;color:var(--sys-blue);font-weight:600;margin-bottom:4px}
.reminder-overlay .card .sys-header .sys-icon{font-size:14px;margin-right:4px}
.reminder-overlay .card .narrative{font-size:13px;color:var(--text);line-height:1.7;font-style:italic;margin-top:8px;border-left:2px solid var(--sys-blue);padding-left:10px}
.reminder-overlay .card .narrative p{margin-bottom:4px}
.reminder-overlay .card .actions{display:flex;gap:8px;margin-top:12px}
.reminder-overlay .card .actions .btn-primary{background:var(--sys-blue);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px}
.reminder-overlay .card .actions .btn-skip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px}

/* 升级弹窗 */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay .modal{background:var(--card);border:2px solid var(--sys-blue);border-radius:16px;padding:24px;text-align:center;max-width:300px}
.overlay .modal .sys-label{font-size:10px;color:var(--sys-blue);font-weight:600;background:var(--sys-glow);padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:6px}
.overlay .modal .big{font-size:36px;margin-bottom:4px}
.overlay .modal .title{font-size:16px;font-weight:700;color:var(--sys-blue)}
.overlay .modal .desc{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6}
.overlay .modal .btn{margin-top:14px;background:var(--sys-blue);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);border-top:1px solid var(--border);display:flex;height:56px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--muted);cursor:pointer;transition:.2s;gap:1px}
.nav-item.active{color:var(--sys-blue)}
.nav-item .nav-ico{font-size:18px}

/* 历史 */
.history-card{background:var(--card2);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.history-card .date{color:var(--muted);font-variant-numeric:tabular-nums}
.history-card .cnt{color:var(--accent2);font-weight:600}
.history-card .xp{color:var(--wis);font-weight:600;font-size:12px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--sys-glow);border:1px solid var(--sys-blue);color:var(--sys-blue);padding:10px 20px;border-radius:8px;font-size:13px;z-index:90;transition:.3s;font-weight:600}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(min-width:481px){.app{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="info">
      <span class="lv" id="totalLv">Lv.1</span>
      <span class="player-name" id="playerName">林默</span>
      <span class="title-badge" id="titleBadge">初醒者</span>
      <div class="exp-bar"><div class="exp-fill" id="totalExpFill"></div></div>
    </div>
    <span class="streak" id="streakLabel">🔥 0天</span>
  </div>
  <div class="tab-content" id="tabContent"></div>
  <div class="bottom-nav">
    <div class="nav-item active" data-tab="home"><span class="nav-ico">🏠</span>首页</div>
    <div class="nav-item" data-tab="schedule"><span class="nav-ico">📅</span>日程</div>
    <div class="nav-item" data-tab="tasks"><span class="nav-ico">⚔️</span>任务</div>
    <div class="nav-item" data-tab="story"><span class="nav-ico">📖</span>剧情</div>
    <div class="nav-item" data-tab="history"><span class="nav-ico">📊</span>历史</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="sys-label" id="modalSysLabel">【系统】</div>
    <div class="big" id="modalIco">🌟</div>
    <div class="title" id="modalTitle">属性觉醒！</div>
    <div class="desc" id="modalDesc"></div>
    <div class="btn" id="modalBtn">确认</div>
  </div>
</div>

<div class="chapter-overlay" id="chapterOverlay">
  <div class="modal">
    <div class="sys-tag">【系统】新章节解锁</div>
    <div class="big" id="chModalIco">📖</div>
    <div class="title" id="chModalTitle"></div>
    <div class="narrative" id="chModalNarrative"></div>
    <div class="info-row" id="chModalInfo"></div>
    <div class="btn" id="chModalBtn">继续旅程</div>
  </div>
</div>

<div class="reminder-overlay" id="reminderOverlay">
  <div class="card">
    <div class="sys-header" id="remHeader"><span class="sys-icon">🔔</span>【系统】副本已开启</div>
    <div class="narrative" id="remNarrative"></div>
    <div class="actions">
      <button class="btn-primary" id="remAccept">前往副本</button>
      <button class="btn-skip" id="remSkip">稍后再说</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// 章节数据（9章）
// =============================================
const CHAPTERS=[
  {id:1,title:'觉醒之初',totalLvReq:1,
   narrative:['你盯着眼前悬浮的蓝色光幕，手指试探性地触碰那些半透明的文字。它们像水波一样荡漾开去，然后又恢复了平静。','系统面板上的数值很低——低得有点可笑。气血Lv.0，精力Lv.0，金币Lv.0，智慧Lv.0。你苦笑了一下，原来在系统的眼里，你现在是这么弱小吗？','但光幕底部有一行字在微微发光：【完成初始任务，唤醒你的第一项属性】'],
   goal:'任意1个属性达到Lv.1',unlockTitle:'初醒者',ability:'解锁「每日随机任务」功能'},
  {id:2,title:'晨光中的第一步',totalLvReq:2,
   narrative:['七天了。你已经习惯了每天早上醒来时，那片蓝色光幕准时出现在视野里。','更奇怪的是，你开始习惯按照系统提示去行动。早上拉开窗帘晒太阳的时候，你看到「精力+8」的字样在眼前一闪而过，嘴角不自觉地扬了起来。','原来变强这件事，真的会让人上瘾。'],
   goal:'所有属性达到Lv.1',unlockTitle:'破晓行者',ability:'解锁「定时提醒」功能'},
  {id:3,title:'身体的回响',totalLvReq:3,
   narrative:['你发现自己的呼吸变得深了。以前爬三楼就喘，现在居然能一路走到公司还不觉得累。','系统面板上的「气血」数值在稳步上涨，每一次散步、每一次举铁，都不再是「为了健康」这种虚无的口号——而是实打实地看到经验条在增长。','你开始相信，这个系统或许真的在改变你。'],
   goal:'气血属性达到Lv.3',unlockTitle:'血气觉醒者',ability:'解锁「气血恢复加速」'},
  {id:4,title:'思维之光的闪烁',totalLvReq:4,
   narrative:['今天工作时，你突然发现一个问题——你居然能集中注意力超过一个小时了。','以前这个时候，你早就已经打开了好几个无关网页，手指在键盘上机械地敲着，思绪却飘到了九霄云外。','系统面板上的「精力」和「智慧」在微微发光。你不确定是因果关系还是巧合，但你觉得，继续下去或许会发现更多。'],
   goal:'精力和智慧均达到Lv.3',unlockTitle:'思维织网者',ability:'解锁「专注模式」'},
  {id:5,title:'金币与价值的发现',totalLvReq:5,
   narrative:['你完成了一个以前一直拖延的工作项目。主管拍了拍你的肩膀说「做得不错」的时候，你看到了系统提示：','【金币+15 · 技能熟练度提升】','原来「金币」并不是指真正的钱。它代表着你在这个世界中的「价值积累」——技能的提升、工作的成果、每一分努力的结晶。你开始重新审视自己每一天的产出。原来你比自己想象的更有价值。'],
   goal:'金币属性达到Lv.5',unlockTitle:'价值探知者',ability:'解锁「双倍金币日」'},
  {id:6,title:'连续之力的觉醒',totalLvReq:6,
   narrative:['三十天了。你翻看系统面板上的历史记录，看到了自己这一个月来每一天的数据。','有些日子你只完成了三个任务，有些日子你全部打完。但最让你惊讶的不是某一天的数据，而是——你居然连续坚持了三十天。','以前的你，任何「好习惯」都坚持不过一周。而现在，系统面板上的连续打卡天数像一枚勋章，提醒着你：你正在变成另一个人。'],

// =============================================
// 数据存储
// =============================================
const DB_KEY='rpg_awakening_v3';

function migrateData(d){
  // 确保所有新字段存在
  d.currentChapter=d.currentChapter||1;
  d.unlockedChapters=d.unlockedChapters||[1];
  d.chapterRead=d.chapterRead||{};
  d.dailyRandomTasks=d.dailyRandomTasks||[];
  d.randomTaskDate=d.randomTaskDate||'';
  d.playerName=d.playerName||'林默';
  d.unlockedTitles=d.unlockedTitles||['初醒者'];
  d.currentTitle=d.currentTitle||'初醒者';
  d.reminderVersionIndex=d.reminderVersionIndex||{};
  // 确保旧字段存在
  d.attrXP=d.attrXP||{hp:0,mp:0,gold:0,wis:0};
  d.tasks=d.tasks||{morning:false,walk:false,iron:false,skill:false,read:false,review:false};
  d.lastDate=d.lastDate||'';
  d.streak=d.streak||0;
  d.streakAddedToday=d.streakAddedToday||false;
  d.history=d.history||{};
  d.seenLevelUps=d.seenLevelUps||{};
  return d;
}

function loadData(){
  try{const raw=localStorage.getItem(DB_KEY);if(raw)return migrateData(JSON.parse(raw));}catch(e){}
  return migrateData({attrXP:{hp:0,mp:0,gold:0,wis:0},tasks:{morning:false,walk:false,iron:false,skill:false,read:false,review:false}});
}
function saveData(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

// =============================================
// 每日刷新 + 随机任务生成
// =============================================
function generateRandomTasks(data){
  const today=todayStr();
  if(data.randomTaskDate===today&&data.dailyRandomTasks.length>0)return;
  const dayOfWeek=new Date().getDay();
  const isWeekend=(dayOfWeek===0||dayOfWeek===6);
  const pool=isWeekend?WEEKEND_RANDOM:WEEKDAY_RANDOM;
  const numTasks=Math.random()>0.5?2:1;
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  data.dailyRandomTasks=shuffled.slice(0,numTasks).map((t,i)=>({
    ...t,key:`random_${today}_${i}`,xp:t.xp+3,done:false
  }));
  data.randomTaskDate=today;
  saveData(data);
}

function refreshDay(data){
  const today=todayStr();
  if(data.lastDate!==today){
    if(data.lastDate)data.history[data.lastDate]={...data.tasks,randomTasks:data.dailyRandomTasks.map(t=>({key:t.key,done:t.done}))};
    const yesterday=yesterdayStr();
    const yHist=data.history[yesterday];
    const yDone=yHist?(Object.values(yHist).some(v=>typeof v==='boolean'&&v)||yHist.randomTasks?.some(t=>t.done)):false;
    if(data.lastDate!==yesterday&&data.streak>0)data.streak=0;
    data.tasks={morning:false,walk:false,iron:false,skill:false,read:false,review:false};
    data.streakAddedToday=false;
    generateRandomTasks(data);
    checkChapterProgress(data);
    data.lastDate=today;
    saveData(data);
  }
  return data;
}

// =============================================
// 属性等级计算
// =============================================
function getAttrLevel(xp,th){let lv=0;for(let i=1;i<th.length;i++){if(xp>=th[i])lv=i;else break;}return lv;}
function getAttrProgress(xp,th){const lv=getAttrLevel(xp,th);const c=th[lv]||0;const n=th[lv+1]||(th[th.length-1]+100);return{lv,curTh:c,nextTh:n,progress:Math.min((xp-c)/(n-c),1),xp};}
function getTotalLevel(data){const ls=ATTRS.map(a=>getAttrLevel(data.attrXP[a.key],a.thresholds));return Math.min(...ls)<=0?1:Math.min(...ls)+1;}
function getTotalProgress(data){const ls=ATTRS.map(a=>getAttrLevel(data.attrXP[a.key],a.thresholds));const minLv=Math.min(...ls);const weakest=ATTRS.find(a=>getAttrLevel(data.attrXP[a.key],a.thresholds)===minLv);if(!weakest)return 0;return getAttrProgress(data.attrXP[weakest.key],weakest.thresholds).progress;}

// =============================================
// 章节进度检查
// =============================================
function checkChapterProgress(data){
  const tl=getTotalLevel(data);
  CHAPTERS.forEach(ch=>{
    if(tl>=ch.totalLvReq&&!data.unlockedChapters.includes(ch.id)){
      data.unlockedChapters.push(ch.id);
      data.currentChapter=ch.id;
      data.chapterRead[ch.id]=false;
      if(ch.unlockTitle&&!data.unlockedTitles.includes(ch.unlockTitle)){
        data.unlockedTitles.push(ch.unlockTitle);
        data.currentTitle=ch.unlockTitle;
      }
      // 显示章节解锁弹窗
      showChapterModal(ch);
      saveData(data);
    }
  });
}

function showChapterModal(ch){
  document.getElementById('chModalTitle').textContent=`第${ch.id}章：${ch.title}`;
  let html='';
  ch.narrative.forEach(p=>{html+=`<p>${p}</p>`});
  document.getElementById('chModalNarrative').innerHTML=html;
  document.getElementById('chModalInfo').innerHTML=`称号：${ch.unlockTitle} | 觉醒能力：${ch.ability}`;
  document.getElementById('chapterOverlay').classList.add('show');
  document.getElementById('chModalBtn').onclick=()=>{
    document.getElementById('chapterOverlay').classList.remove('show');
    data.chapterRead[ch.id]=true;
    saveData(data);
    render();
  };
}

function renderHistory(){

      const fixedCnt=Object.entries(h).filter(([k,v])=>typeof v==='boolean'&&v&&TASKS.some(t=>t.key===k)).length;

// =============================================

function bindEvents(){
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.addEventListener('click',()=>{
      currentTab=n.dataset.tab;
      document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
      n.classList.add('active');
      renderContent();
    });
  });
  // 固定任务打卡
  document.querySelectorAll('.dungeon-task').forEach(c=>{
    c.addEventListener('click',()=>toggleTask(c.dataset.key,c));
  });
  // 随机任务打卡
  document.querySelectorAll('.random-task').forEach(c=>{
    c.addEventListener('click',()=>toggleRandomTask(c.dataset.rkey,c));
  });
  // 章节详情查看
  document.querySelectorAll('.story-chapter:not(.locked)').forEach(c=>{
    c.addEventListener('click',()=>{
      const ch=CHAPTERS.find(ch=>ch.id===parseInt(c.dataset.chid));
      if(ch)showChapterModal(ch);
    });
  });
  // 称号切换
  document.querySelectorAll('[data-title]').forEach(el=>{
    el.addEventListener('click',()=>{
      data.currentTitle=el.dataset.title;
      saveData(data);render();
    });
  });
}

// =============================================
// 打卡逻辑
// =============================================
function toggleTask(key,el){
  const wasDone=data.tasks[key];
  data.tasks[key]=!wasDone;
  const task=TASKS.find(t=>t.key===key);
  if(data.tasks[key]){
    data.attrXP[task.attr]+=task.xp;
    if(!data.streakAddedToday){data.streak+=1;data.streakAddedToday=true;}
  }else{
    data.attrXP[task.attr]=Math.max(0,data.attrXP[task.attr]-task.xp);
    if(!Object.values(data.tasks).some(v=>v)&&!data.dailyRandomTasks.some(t=>t.done)){
      if(data.streakAddedToday){data.streak=Math.max(0,data.streak-1);data.streakAddedToday=false;}
    }
  }
  checkAttrLevelUp(task.attr);
  checkTotalLevelUp();
  saveData(data);render();
  if(data.tasks[key]&&el){el.classList.add('justDone');setTimeout(()=>el.classList.remove('justDone'),300);}
}

function toggleRandomTask(key,el){
  const task=data.dailyRandomTasks.find(t=>t.key===key);
  if(!task)return;
  task.done=!task.done;
  if(task.done){
    data.attrXP[task.attr]+=task.xp;
    if(!data.streakAddedToday){data.streak+=1;data.streakAddedToday=true;}
  }else{
    data.attrXP[task.attr]=Math.max(0,data.attrXP[task.attr]-task.xp);
    if(!Object.values(data.tasks).some(v=>v)&&!data.dailyRandomTasks.some(t=>t.done)){
      if(data.streakAddedToday){data.streak=Math.max(0,data.streak-1);data.streakAddedToday=false;}
    }
  }
  checkAttrLevelUp(task.attr);
  checkTotalLevelUp();
  saveData(data);render();
  if(task.done&&el){el.classList.add('justDone');setTimeout(()=>el.classList.remove('justDone'),300);}
}

function checkAttrLevelUp(attrKey){
  const attr=ATTRS.find(a=>a.key===attrKey);
  const p=getAttrProgress(data.attrXP[attrKey],attr.thresholds);
  const lvKey=attrKey+'_lv_'+p.lv;
  if(p.lv>0&&!data.seenLevelUps[lvKey]){
    data.seenLevelUps[lvKey]=true;
    showSysModal(`【系统】${attr.ico} ${attr.name}属性觉醒！`,`${attr.name} Lv.${p.lv-1} → Lv.${p.lv}\n\n系统面板检测到属性值突破阈值。${attr.name}经验已稳定积累，觉醒进度提升。`);
    saveData(data);
  }
}

function checkTotalLevelUp(){
  const tl=getTotalLevel(data);
  const lvKey='total_lv_'+tl;
  if(tl>1&&!data.seenLevelUps[lvKey]){
    data.seenLevelUps[lvKey]=true;
    showSysModal('【系统】人物等级觉醒！',`总等级提升到 Lv.${tl}！所有属性已达到升级阈值。\n\n你感到系统面板的光芒更加明亮了。你离真相，又近了一步。`);
    saveData(data);
  }
}

function showSysModal(title,desc){
  document.getElementById('modalSysLabel').textContent=title.split('】')[0]+'】';
  document.getElementById('modalTitle').textContent=title.split('】')[1]||title;
  document.getElementById('modalDesc').textContent=desc;
  document.getElementById('modalIco').textContent='🌟';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('modalBtn').onclick=()=>document.getElementById('overlay').classList.remove('show');
}

// =============================================
// 定时提醒系统
// =============================================
function checkReminders(){
  if(!data.remindersEnabled)return data.remindersEnabled??true;
  const now=new Date();
  const hhmm=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const texts=REMINDER_TEXTS[hhmm];
  if(!texts)return;
  const today=todayStr();
  const key=`reminded_${today}_${hhmm}`;
  if(data[key])return;
  // 轮换版本
  const vi=data.reminderVersionIndex[hhmm]||0;
  const version=texts[vi%texts.length];
  data.reminderVersionIndex[hhmm]=(vi+1)%texts.length;
  data[key]=true;
  saveData(data);
  showReminderModal(version);
}

function showReminderModal(version){
  document.getElementById('remHeader').innerHTML=`<span class="sys-icon">🔔</span>【系统】${version.sys}`;
  let html='';
  version.narrative.forEach(p=>{html+=`<p>${p}</p>`});
  document.getElementById('remNarrative').innerHTML=html;
  document.getElementById('reminderOverlay').classList.add('show');
  document.getElementById('remAccept').onclick=()=>{
    document.getElementById('reminderOverlay').classList.remove('show');
    currentTab='tasks';render();
    document.querySelectorAll('.nav-item').forEach(n=>{
      n.classList.toggle('active',n.dataset.tab==='tasks');
    });
  };
  document.getElementById('remSkip').onclick=()=>document.getElementById('reminderOverlay').classList.remove('show');
  // 尝试系统通知
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification(`【系统】${version.sys}`, {body:version.narrative[0],icon:'icon-192.png'});}catch(e){}
  }
}
